<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - CoolLabo インフルエンサー管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 400px; margin: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2); border: none; border-radius: 16px; }
        .login-header { background: linear-gradient(135deg, #0d6efd, #6610f2); color: #fff; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
        .login-header h3 { margin: 0; }
        .login-header .icon { font-size: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="login-header">
                <div class="icon"><i class="bi bi-snow2"></i></div>
                <h3>CoolLabo</h3>
                <small>インフルエンサー管理システム</small>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-sm py-2" role="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-lock"></i> パスワード</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               placeholder="パスワードを入力" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> ログイン
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
